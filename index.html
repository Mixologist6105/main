<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/canada.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MixoCore DML</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // GitHub Pages SPA fallback: decode redirected routes from 404.html
      ;(function () {
        const search = window.location.search
        if (!search || search.length < 2) return
        // Expected format: ?/path&k=v (ampersands escaped by 404.html)
        const redirected = search.slice(1)
        if (!redirected.startsWith('/')) return
        const restoredPath = redirected.replace(/&/g, '?').replace(/~and~/g, '&')
        window.history.replaceState(null, '', window.location.pathname.replace(/\/$/, '') + restoredPath + window.location.hash)
      })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
